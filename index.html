<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catalogador de Cores</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f7fa;
    padding:15px;
}

.container{
    max-width:900px;
    margin:auto;
}

.titulo{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.painel{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:15px 20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    text-align:center;
    min-width:140px;
}

.numero{
    font-size:32px;
    font-weight:bold;
    margin-top:5px;
}

.verde{
    color:#00a651;
}

.vermelho{
    color:#d32f2f;
}

.grid-container{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.grid{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:4px;
}

.bloco{
    width:100%;
    aspect-ratio:1/1;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
    border-radius:4px;
    transition:.15s;
}

.bloco:hover{
    transform:scale(1.03);
}

.bloco.verde{
    background:#00c853;
    border-color:#00c853;
}

.bloco.vermelho{
    background:#d50000;
    border-color:#d50000;
}

.area-botao{
    margin-top:20px;
    text-align:center;
}

button{
    background:#1976d2;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

@media (max-width:600px){

    .card{
        min-width:120px;
        padding:12px;
    }

    .numero{
        font-size:28px;
    }

    .grid{
        gap:2px;
    }

}

</style>
</head>

<body>

<div class="container">

    <h1 class="titulo">Catalogador de Cores</h1>

    <div class="painel">

        <div class="card">
            <div>🟢 WIN</div>
            <div id="verdes" class="numero verde">0</div>
        </div>

        <div class="card">
            <div>🔴 LOSS</div>
            <div id="vermelhos" class="numero vermelho">0</div>
        </div>

    </div>

    <div class="grid-container">

        <div class="grid" id="grid"></div>

        <div class="area-botao">
            <button onclick="resetar()">
                Resetar Tudo
            </button>
        </div>

    </div>

</div>

<script>

const grid = document.getElementById('grid');

for(let i=0; i<24; i++){

    const bloco = document.createElement('div');

    bloco.classList.add('bloco');

    bloco.dataset.estado = 0;

    bloco.addEventListener('click', ()=>{

        let estado = parseInt(bloco.dataset.estado);

        estado++;

        if(estado > 2){
            estado = 0;
        }

        bloco.dataset.estado = estado;

        bloco.classList.remove('verde');
        bloco.classList.remove('vermelho');

        if(estado === 1){
            bloco.classList.add('verde');
        }

        if(estado === 2){
            bloco.classList.add('vermelho');
        }

        atualizarContagem();

    });

    grid.appendChild(bloco);

}

function atualizarContagem(){

    let verdes = 0;
    let vermelhos = 0;

    document.querySelectorAll('.bloco').forEach(bloco=>{

        const estado = parseInt(bloco.dataset.estado);

        if(estado === 1) verdes++;
        if(estado === 2) vermelhos++;

    });

    document.getElementById('verdes').textContent = verdes;
    document.getElementById('vermelhos').textContent = vermelhos;

}

function resetar(){

    document.querySelectorAll('.bloco').forEach(bloco=>{

        bloco.dataset.estado = 0;

        bloco.classList.remove('verde');
        bloco.classList.remove('vermelho');

    });

    atualizarContagem();

}

</script>

</body>
</html>
