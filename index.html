<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Catalogador V2</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0b1020,#111827,#0f172a);
color:#fff;
margin:0;
padding:15px;
}

.container{max-width:1200px;margin:auto}

.card{
background:rgba(17,24,39,.95);
padding:15px;
border-radius:14px;
margin-bottom:15px;
border:1px solid rgba(103,232,249,.2);
box-shadow:
0 0 12px rgba(103,232,249,.15),
0 0 25px rgba(103,232,249,.08);
}

.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px}

.cell{
aspect-ratio:1;
border:1px solid #334155;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
background:#1e293b;
color:#fff;
transition:.2s;
}

.green{background:#00c853;color:#fff}

.red{background:#d50000;color:#fff}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.stat{

background:#0f172a;

padding:12px;

border-radius:12px;

text-align:center;

box-shadow:

0 0 10px rgba(103,232,249,.15);}

button{padding:10px 14px;margin:5px;border:none;border-radius:8px;cursor:pointer}

.primary{
background:#06b6d4;
color:white;
box-shadow:0 0 15px rgba(6,182,212,.5);
}

.danger{
background:#ef4444;
color:white;
box-shadow:0 0 15px rgba(239,68,68,.5);

}
.dual{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.infoBox{

background:#0f172a;

padding:15px;

border-radius:12px;

border:1px solid rgba(103,232,249,.15);

box-shadow:

0 0 10px rgba(103,232,249,.15);

}

.heat{display:grid;grid-template-columns:repeat(12,1fr);gap:4px}

.h{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold}

table{
width:100%;
border-collapse:collapse;
color:white;
}

td,th{
border:1px solid #334155;
padding:6px;
text-align:center;
}

@media(max-width:700px){

.dual{
grid-template-columns:1fr;
}

.stats{
grid-template-columns:1fr;
}

}
 
</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Catalogador Atual</h2>

<div id="grid" class="grid"></div>

<br>

<button class="primary" onclick="resetRodada()">Resetar Rodada</button>

<button class="danger" onclick="zerarTudo()">Zerar Tudo</button>

</div>

<div class="card">

<div class="stats">

<div class="stat">Catalogações: <b id="sess">0</b></div>

<div class="stat">Wins: <b id="wins">0</b></div>

<div class="stat">Losses: <b id="losses">0</b></div>

</div>

</div>

<div class="card">

<div class="dual">

<div class="infoBox">
<h3>🏆 Melhor posição</h3>
<div id="best">Sem dados</div>
</div>

<div class="infoBox">
<h3>⚠️ Pior posição</h3>
<div id="worst">Sem dados</div>
</div>

</div>

</div>

<div class="card">

<h3>Heatmap</h3>

<div id="heat" class="heat"></div>

</div>

<div class="card">

<h3>Ranking</h3>

<table>

<thead><tr><th>Posição</th><th>Win</th><th>Loss</th><th>%Win</th></tr></thead>

<tbody id="rank"></tbody>

</table>

</div>

</div>

<script>

const TOTAL=24;

let rodada=new Array(TOTAL).fill(0);

function dados(){

return JSON.parse(localStorage.getItem("catv2"))||{

sessoes:0,wins:0,losses:0,

pos:Array.from({length:24},()=>({w:0,l:0}))

};

}

function salvar(d){localStorage.setItem("catv2",JSON.stringify(d));}

const grid=document.getElementById("grid");

for(let i=0;i<TOTAL;i++){

 const c=document.createElement("div");

 c.className="cell";

 c.textContent=String(i+1).padStart(2,"0");

 c.onclick=()=>{

   rodada[i]=(rodada[i]+1)%3;

   c.className="cell";

   if(rodada[i]===1)c.classList.add("green");

   if(rodada[i]===2)c.classList.add("red");

   verificar();

 };

 grid.appendChild(c);

}

function verificar(){

 if(rodada.every(v=>v!==0)){

   let d=dados();

   d.sessoes++;

   rodada.forEach((v,i)=>{

      if(v===1){d.wins++;d.pos[i].w++;}

      if(v===2){d.losses++;d.pos[i].l++;}

   });

   salvar(d);

   alert("Catalogação salva com sucesso!");

   resetRodada();

   atualizar();

 }

}

function resetRodada(){

 rodada.fill(0);

 document.querySelectorAll(".cell").forEach((c,i)=>{

   c.className="cell";

   c.textContent=String(i+1).padStart(2,"0");

 });

}

function zerarTudo(){

 if(confirm("Apagar todo histórico?")){

   localStorage.removeItem("catv2");

   resetRodada();

   atualizar();

 }

}

function posInfo(idx){

 return "Linha "+(idx<12?1:2)+" | Coluna "+((idx%12)+1);

}

function atualizar(){

 const d=dados();

 sess.textContent=d.sessoes;

 wins.textContent=d.wins;

 losses.textContent=d.losses;

 let melhor=null,pior=null;

 let lista=[];

 d.pos.forEach((p,i)=>{

   const t=p.w+p.l;

   const pct=t?100*p.w/t:0;

   lista.push({i:i+1,w:p.w,l:p.l,pct});

   if(t){

      if(!melhor||pct>melhor.pct) melhor={i,pct,w:p.w,l:p.l};

      if(!pior||pct<pior.pct) pior={i,pct,w:p.w,l:p.l};

   }

 });

 document.getElementById("best").innerHTML=melhor?

 `Posição ${melhor.i+1}<br>${posInfo(melhor.i)}<br>Win:${melhor.w} Loss:${melhor.l}<br>${melhor.pct.toFixed(1)}%`

 :"Sem dados";

 document.getElementById("worst").innerHTML=pior?

 `Posição ${pior.i+1}<br>${posInfo(pior.i)}<br>Win:${pior.w} Loss:${pior.l}<br>${pior.pct.toFixed(1)}%`

 :"Sem dados";

 heat.innerHTML="";

 d.pos.forEach((p,i)=>{

   const t=p.w+p.l;

   const pct=t?Math.round(100*p.w/t):0;

   const div=document.createElement("div");

   div.className="h";

   div.textContent=(i+1)+" | "+pct+"%";

   div.style.background=pct>=70?"#00c853":pct>=40?"#ffd54f":"#ef5350";

   heat.appendChild(div);

 });

 lista.sort((a,b)=>b.pct-a.pct);

 rank.innerHTML=lista.map(x=>`<tr><td>${x.i}</td><td>${x.w}</td><td>${x.l}</td><td>${x.pct.toFixed(1)}%</td></tr>`).join("");

}

atualizar();

</script>

</body>

</html>
